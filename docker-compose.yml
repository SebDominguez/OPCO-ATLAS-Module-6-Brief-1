services:
  api:
    build: fastapi_app
    ports:
      - "${FASTAPI_PORT:-8080}:${FASTAPI_PORT:-8080}"
    environment:
      FASTAPI_PORT: ${FASTAPI_PORT}
    networks:
      - app_network

  streamlit:
    build: streamlit_app
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    depends_on:
      - api
    environment:
      API_URL: http://api:${FASTAPI_PORT:-8080}/
    volumes:
      - ./logs:/logs  # Montage du volume pour stocker les logs de loguruuuuuuuu
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - api
    networks:
      - app_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:${GRAFANA_PORT:-3000}"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:${NODE_EXPORTER_PORT:-9100}"
    networks:
      - app_network

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:${UPTIME_KUMA_PORT:-3001}"
    volumes:
      - ./uptime-kuma-data:/app/data
    networks:
      - app_network

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    container_name: prefect-server
    ports:
      - "4200:4200" # UI + API
    volumes:
      - prefect_data:/root/.prefect # persistance SQLite
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').read()\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - app_network

  flow:
    build: flow
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONIOENCODING=utf-8
    restart: on-failure:3
    stop_grace_period: 5s
    #volumes:
      # non utilisé
      # - ./flow/logs:/app/logs/
    networks:
      - app_network

volumes:
  prefect_data:

networks:
  app_network: